/* ---- SFDA content-compliance guard (client side) ----
   A scientific HCP program must never surface entertainment / non-scientific recreational content.
   This strips such content BY DEFAULT from any dataset (built-in, edition-injected, or API), so it can
   never reach an attendee — even if it slips into the source data. Structure/fields are preserved. */
const CX_RE = /\b(entertainment|shows?|showtime|la perle|belly[\s-]?dance|dance|dancing|dancer|night ?club|nightlife|disco|party|parties|alcohol\w*|wine|beer|spirits|cocktail|pub|brewery|winery|casino|gambl\w*|betting|spa|massage|swim\w*|diving|scuba|snorkel\w*|jet[\s-]?ski|water ?sports?|concert|festival|cabaret)\b/i;
const cxBad = (s) => CX_RE.test(String(s == null ? "" : s));
const cxClean = (s) => { let t = String(s == null ? "" : s).replace(/\s*\((?:entertainment|show|dancing|nightlife|leisure)\)/ig, "").trim(); return cxBad(t) ? "" : t; };
const cxList = (a) => Array.isArray(a) ? a.filter(x => typeof x === "string" ? !cxBad(x) : true) : a;
function complyEvent(ev) {
  if (!ev || typeof ev !== "object") return ev;
  const e = Object.assign({}, ev);
  if (e.entertainment) delete e.entertainment;          // remove the whole non-compliant field
  if (Array.isArray(e.dining)) e.dining = cxList(e.dining);
  if (Array.isArray(e.sightseeing)) e.sightseeing = cxList(e.sightseeing);
  if (Array.isArray(e.objectives)) e.objectives = cxList(e.objectives);
  if (e.agenda && Array.isArray(e.agenda.rows)) e.agenda = Object.assign({}, e.agenda, { rows: e.agenda.rows.filter(r => !cxBad(r && (r.topic || r.who))) });
  if (e.day && Array.isArray(e.day.items)) e.day = Object.assign({}, e.day, { items: e.day.items.filter(it => !cxBad(it && it.title)) });
  return e;
}

const store = {
  async get(k, s = true) { try { const r = await window.storage.get(k, s); return r ? r.value : null; } catch { return null; } },
  async set(k, v, s = true) { try { await window.storage.set(k, v, s); return true; } catch { return false; } },
};

const fmtTime = (iso) => new Date(iso).toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
const OPEN_BEFORE_MS = 30 * 60000, OPEN_AFTER_MS = 60 * 60000;
function activityState(item, now, override) {
  if (override === "open") return "open";
  if (override === "closed") return "closed";
  const s = new Date(item.start).getTime(), e = new Date(item.end).getTime();
  if (now < s - OPEN_BEFORE_MS) return "upcoming";
  if (now > e + OPEN_AFTER_MS) return "closed";
  return "open";
}
function useOverrides(eventId) {
  const [ov, setOv] = useState({});
  const KEY = NS(eventId).overrides;
  const reload = useCallback(async () => { const raw = await store.get(KEY, true); setOv(raw ? JSON.parse(raw) : {}); }, [KEY]);
  useEffect(() => { reload(); }, [reload]);
  const setOverride = useCallback(async (id, val) => {
    const raw = await store.get(KEY, true); const cur = raw ? JSON.parse(raw) : {};
    if (val === null) delete cur[id]; else cur[id] = val;
    await store.set(KEY, JSON.stringify(cur), true); setOv({ ...cur });
  }, [KEY]);
  return { ov, setOverride, reload };
}
/* device-local identity: remember which guest "I am" (not shared) */
function useMe(eventId) {
  const KEY = `hp:${eventId}:me`;
  const [me, setMe] = useState(null);
  useEffect(() => { (async () => { const v = await store.get(KEY, false); setMe(v || null); })(); }, [KEY]);
  const save = useCallback(async (name) => { setMe(name); await store.set(KEY, name, false); }, [KEY]);
  const clear = useCallback(async () => { setMe(null); await store.set(KEY, "", false); }, [KEY]);
  return { me, save, clear };
}

function tripCountdown(ev) {

/* ===== Venue map — offline SVG schematic of Airport → Hotel → Venue with drive-time.
   No map tiles, no API key, no location tracking. Deep links to Maps reuse existing URLs. ===== */
function VenueMap({ ev }) {
  const ar = (L === STR.ar);
  const DI = (typeof window !== "undefined") ? window.DestIntel : null;
  const r = DI ? DI.resolve(ev.id || ev.city, { lat: ev.lat, lng: ev.lng, tz: ev.tz }) : null;
  const ap = (r && r.airport) || (ev.travel ? { name: ev.travel.airport, km: null, driveMin: null } : null);
  const hotel = ev.hotel || null;
  const venueName = (ev.agenda && ev.agenda.venue) || (hotel && hotel.name) || "";

  const apMap = (ev.travel && ev.travel.airportMap) || null;
  const hotelMap = (hotel && hotel.map) || null;
  const legAH = ap && (ap.km != null) ? `≈ ${ap.km} ${ar ? "كم" : "km"} · ~${ap.driveMin} ${ar ? "د" : "min"}` : (ev.travel && ev.travel.flight ? "" : "");
  const node = (x, ic, label) => (
    <g>
      <circle cx={x} cy="46" r="19" fill="var(--chip)" stroke="#C9A24A" strokeWidth="1.5" />

    : [[50, "✈️", ar ? "المطار" : "Airport"], [160, "🏨", ar ? "الفندق" : "Hotel"], [270, "🏛️", ar ? "المقر" : "Venue"]];
  return (
    <div>
      <div style={{ marginTop: 14 }}><Label>{ar ? "الخريطة — المطار والفندق والمقر" : "Map — airport · hotel · venue"}</Label></div>
      <Card>
        <svg viewBox="0 0 320 100" width="100%" style={{ maxHeight: 120 }} role="img" aria-label="venue map">
          {/* connectors */}
          {nodes.length === 3 ? (<>
            <line x1="69" y1="46" x2="151" y2="46" stroke="#C9A24A" strokeWidth="2" strokeDasharray="4 4" />
            <line x1="169" y1="46" x2="261" y2="46" stroke="#C9A24A" strokeWidth="2" strokeDasharray="4 4" />
            {legAH && <text x="110" y="32" textAnchor="middle" fontSize="9" fontWeight="800" fill="var(--mut)">{legAH}</text>}
            <text x="215" y="32" textAnchor="middle" fontSize="9" fontWeight="700" fill="var(--mut)">{ar ? "قريب" : "short hop"}</text>
          </>) : (<>
            <line x1="79" y1="46" x2="201" y2="46" stroke="#C9A24A" strokeWidth="2" strokeDasharray="4 4" />
            {legAH && <text x="140" y="32" textAnchor="middle" fontSize="9" fontWeight="800" fill="var(--mut)">{legAH}</text>}
          </>)}
          {nodes.map(([x, ic, lb], i) => <g key={i}>{node(x, ic, lb)}</g>)}
        </svg>
        <div style={{ display: "flex", gap: 8, marginTop: 10, flexWrap: "wrap" }}>
          {apMap && <a href={apMap} target="_blank" rel="noreferrer" style={{ flex: 1, minWidth: 120, textAlign: "center", textDecoration: "none", background: "var(--chip)", border: "1px solid var(--line)", color: "var(--ink)", borderRadius: "var(--rs)", padding: "10px 0", fontSize: 12.5, fontWeight: 800 }}>✈️ {ar ? "المطار" : "Airport"} ↗</a>}
          {hotelMap && <a href={hotelMap} target="_blank" rel="noreferrer" style={{ flex: 1, minWidth: 120, textAlign: "center", textDecoration: "none", background: "var(--chip)", border: "1px solid var(--line)", color: "var(--ink)", borderRadius: "var(--rs)", padding: "10px 0", fontSize: 12.5, fontWeight: 800 }}>🏨 {ar ? "الفندق" : "Hotel"} ↗</a>}
        </div>
        {ap && ap.name && <div style={{ fontSize: 11, color: "var(--mut)", marginTop: 8 }}>{ap.name}{ap.code ? ` (${ap.code})` : ""}{hotel && hotel.dist ? ` · ${hotel.dist}` : ""}</div>}
      </Card>
    </div>
  );
}

/* ===== Attendance certificate (educational, SFDA-positive). CME credits ONLY if the
   organizer supplies an accreditation line — never fabricated. Printable / save-as-PDF. ===== */
function Certificate({ ev, name, sessions, attended }) {
  const ar = (L === STR.ar);

}
function hashStr(s) { let h = 0; for (let i = 0; i < s.length; i++) { h = (h * 31 + s.charCodeAt(i)) | 0; } return h; }

function CertificateView({ ev }) {
  const ar = (L === STR.ar);
  const { me } = useMe(ev.id);
  const [typed, setTyped] = useState("");

  useEffect(() => { (async () => { const out = {}; for (const it of items) { const raw = await store.get(NS(ev.id).attend(it.id), true); out[it.id] = raw ? JSON.parse(raw) : {}; } setRecords(out); })(); }, [ev.id]);
  const who = me || typed.trim();

      <div style={{ marginTop: 8 }}><Label>{ar ? "شهادة الحضور" : "Attendance certificate"}</Label></div>
      <Certificate ev={ev} name={who} sessions={sessions} attended={attended} />

    </div>
  );
}

function Ring({ done, total, size = 54 }) {
  const pct = total ? done / total : 0;
  const r = (size - 8) / 2, c = 2 * Math.PI * r;
  return (
    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}>
      <circle cx={size / 2} cy={size / 2} r={r} fill="none" stroke="var(--line)" strokeWidth="6" />
      <circle cx={size / 2} cy={size / 2} r={r} fill="none" stroke={ORANGE} strokeWidth="6" strokeLinecap="round"
        strokeDasharray={c} strokeDashoffset={c * (1 - pct)} transform={`rotate(-90 ${size / 2} ${size / 2})`} />
      <text x="50%" y="52%" dominantBaseline="middle" textAnchor="middle" fontSize="14" fontWeight="800" fill="var(--ink)">{done}/{total}</text>
    </svg>
  );
}
function CheckinView({ ev, ov }) {
  const [now, setNow] = useState(Date.now());
  useEffect(() => { const t = setInterval(() => setNow(Date.now()), 15000); return () => clearInterval(t); }, []);
  const [preview, setPreview] = useState(false);
  const { me, save, clear } = useMe(ev.id);
  const [records, setRecords] = useState({});
  const [q, setQ] = useState("");
  const [toast, setToast] = useState("");
  const items = ev.day.items;
  const effNow = preview ? new Date(items[0].start).getTime() + 5 * 60000 : now;

  const loadAll = useCallback(async () => {
    const out = {};
    for (const it of items) { const raw = await store.get(NS(ev.id).attend(it.id), true); out[it.id] = raw ? JSON.parse(raw) : {}; }
    setRecords(out);
  }, [ev.id, items]);
  useEffect(() => { loadAll(); }, [loadAll]);

  const showToast = (m) => { setToast(m); setTimeout(() => setToast(""), 1800); };
  const checkIn = async (itemId, name) => {
    const cur = records[itemId] || {};
    const next = { ...cur, [name]: { at: Date.now() } };
    setRecords({ ...records, [itemId]: next });
    await store.set(NS(ev.id).attend(itemId), JSON.stringify(next), true);

  const myDone = me ? items.filter(it => (records[it.id] || {})[me]).length : 0;

          <div style={{ fontSize: 12.5, color: "var(--mut)", marginTop: 2 }}>{ev.day.label} · {items.length} {t("activitiesLine")}</div>
        </div>
        <button onClick={() => setPreview(p => !p)} style={{ alignSelf: "flex-start", fontSize: 10.5, fontWeight: 800, border: `1px solid ${preview ? ORANGE : "var(--line)"}`, background: preview ? "rgba(184,134,47,.12)" : "var(--chip)", color: preview ? ORANGE : "var(--mut)", borderRadius: 18, padding: "5px 9px" }}>{preview ? "● Live" : "Preview"}</button>

/* In-app currency converter — default SAR → destination currency, live rates (cached, offline-safe). */
function MiniConverter({ defaultTo }) {
  const DI = (typeof window !== "undefined") ? window.DestIntel : null;
  const LS = (typeof window !== "undefined") ? window.localStorage : null;
  const ar = (L === STR.ar);
  const [amt, setAmt] = useState(100);
  const [from, setFrom] = useState(NX_BRAND.homeCurrency || "SAR");
  const [to, setTo] = useState(defaultTo || "AED");
  const [rates, setRates] = useState(null);
  const [src, setSrc] = useState("est");
  useEffect(() => {
    if (!DI) return;
    try { const c = LS && JSON.parse(LS.getItem("vq:rates") || "null"); if (c && c.rates) { setRates(c.rates); setSrc("cached"); } } catch (e) {}
    (async () => { const r = await DI.liveRatesAll(); if (r && r.rates) { setRates(r.rates); setSrc("live"); try { LS && LS.setItem("vq:rates", JSON.stringify({ rates: r.rates, at: Date.now() })); } catch (e) {} } })();
  }, []);
  if (!DI) return null;
  const list = DI.currencyList();
  const v = DI.convert(amt, from, to, rates);
  const one = DI.convert(1, from, to, rates);
  const sym = (DI.currencies[to] || {}).symbol || to;
  const tag = src === "live" ? (ar ? "مباشر" : "live") : src === "cached" ? (ar ? "محفوظ" : "cached") : (ar ? "تقديري" : "est");
  const sel = { padding: "10px", fontSize: 14, fontWeight: 800, border: "1px solid var(--line)", borderRadius: 10, background: "var(--card)", color: "var(--ink)", minWidth: 92 };
  const opts = list.map(c => <option key={c.code} value={c.code}>{c.code} {c.symbol}</option>);
  return (
    <Card style={{ marginBottom: 12 }}>
      <div style={{ fontSize: 13.5, fontWeight: 800, color: "var(--ink)", marginBottom: 8 }}>💱 {ar ? "محوّل العملة" : "Currency converter"}</div>
      <div style={{ display: "flex", gap: 8 }}>
        <input type="number" value={amt} onChange={e => setAmt(e.target.value)} style={{ flex: 1, minWidth: 0, padding: "10px 12px", fontSize: 18, fontWeight: 800, border: "1px solid var(--line)", borderRadius: 10, background: "var(--chip)", color: "var(--ink)" }} />
        <select value={from} onChange={e => setFrom(e.target.value)} style={sel}>{opts}</select>
      </div>
      <div style={{ textAlign: "center", margin: "6px 0" }}>
        <button onClick={() => { setFrom(to); setTo(from); }} style={{ width: 34, height: 34, borderRadius: "50%", border: "1px solid var(--line)", background: "var(--card)", color: ORANGE, fontSize: 15, fontWeight: 800 }}>⇅</button>
      </div>
      <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
        <div style={{ flex: 1, minWidth: 0, fontSize: 22, fontWeight: 800, color: "var(--ink)" }}>{v == null ? "—" : (v >= 1000 ? Math.round(v).toLocaleString() : v.toFixed(2)) + " " + sym}</div>
        <select value={to} onChange={e => setTo(e.target.value)} style={sel}>{opts}</select>
      </div>
      <div style={{ fontSize: 11, color: "var(--mut)", marginTop: 8 }}>
        {one == null ? "" : `1 ${from} = ${one.toFixed(3)} ${to}`}
        <span style={{ fontSize: 9.5, fontWeight: 800, color: src === "live" ? GOOD : "var(--mut)", border: `1px solid ${src === "live" ? GOOD : "var(--mut)"}`, borderRadius: 20, padding: "1px 6px", marginLeft: 6 }}>{tag}</span>
      </div>
    </Card>
  );
}

/* Auto-derived destination panel — links the admin's manual content with live,
   daily-updating data. Weather is a live forecast (Open-Meteo) with the offline
   climate normal as fallback; prayer times recompute for TODAY every day. */
function SmartDestination({ ev }) {
  const DI = (typeof window !== "undefined") ? window.DestIntel : null;
  const LS = (typeof window !== "undefined") ? window.localStorage : null;
  const ar = (L === STR.ar);
  const [live, setLive] = useState(null);        // weather; may carry .cached flag
  const [updated, setUpdated] = useState(null);
  const [loading, setLoading] = useState(false);
  const [rate, setRate] = useState(null);        // {perUSD, source:"live"|"cached", at}
  const r = DI ? DI.resolve(ev.id || ev.city) : null; // TODAY (daily): prayer + typical for current date
  const coords = (r && r.resolved) ? r.coords : null;
  const lat = coords ? coords.lat : null, lng = coords ? coords.lng : null;
  const ccode = (r && r.currency) ? r.currency.code : null;
  const wxKey = "vq:wx:" + (ev.id || ev.city), fxKey = "vq:fx:" + (ccode || "");
  const refresh = useCallback(async () => {
    if (!DI || lat == null) return;
    setLoading(true);
    try {
      const lw = await DI.liveWeather(lat, lng);
      if (lw) { const at = Date.now(); setLive(Object.assign({}, lw, { cached: false })); setUpdated(new Date(at)); try { LS && LS.setItem(wxKey, JSON.stringify({ data: lw, at })); } catch (e) {} }
    } finally { setLoading(false); }
  }, [lat, lng, wxKey]);
  const refreshRate = useCallback(async () => {
    if (!DI || !ccode) return;
    try { const lr = await DI.liveRate(ccode); if (lr) { const at = Date.now(); setRate({ perUSD: lr.perUSD, source: "live", at }); try { LS && LS.setItem(fxKey, JSON.stringify({ perUSD: lr.perUSD, at })); } catch (e) {} } } catch (e) {}
  }, [ccode, fxKey]);
  // Hydrate instantly from the last cached values, then refresh live in the background.
  useEffect(() => {
    setLive(null); setUpdated(null); setRate(null);
    try {
      const c = LS && JSON.parse(LS.getItem(wxKey) || "null");
      if (c && c.data) { setLive(Object.assign({}, c.data, { cached: true })); setUpdated(new Date(c.at)); }
      const fc = LS && JSON.parse(LS.getItem(fxKey) || "null");
      if (fc && fc.perUSD) setRate({ perUSD: fc.perUSD, source: "cached", at: fc.at });
    } catch (e) {}
    refresh(); refreshRate();
  }, [ev.id, refresh, refreshRate, wxKey, fxKey]);
  if (!DI || !r || !r.resolved) return null;

  const p = DI.prayerStrings(r.prayer) || {};
  const np = DI.nextPrayer(r.prayer, new Date(), r.tz);
  // next manual agenda item (links admin content with the live data)
  const now = Date.now();
  const items = (ev.day && ev.day.items) ? ev.day.items : [];
  const enriched = items.map(i => ({ i, ts: new Date(i.start).getTime() }));
  const nextAct = (enriched.filter(x => x.ts >= now).sort((a, b) => a.ts - b.ts)[0] || enriched[enriched.length - 1] || {}).i;
  // weather: prefer live, then cached, then typical climate normal
  const wx = live
    ? { now: live.nowC, hi: live.today ? live.today.highC : null, lo: live.today ? live.today.lowC : null, label: live.label, emoji: live.emoji,
        src: live.cached ? (ar ? "محفوظ" : "CACHED") : (ar ? "مباشر" : "LIVE"), col: live.cached ? WARN : GOOD }
    : { now: null, hi: r.weather.typicalHighC, lo: null, label: r.weather.label, emoji: "🌡️", src: ar ? "تقديري" : "TYPICAL", col: "var(--mut)" };
  const fxVal = rate ? rate.perUSD : (r.currency.perUSD || null);
  const fxFmt = fxVal != null ? (fxVal >= 20 ? Math.round(fxVal) : Number(fxVal).toFixed(2)) : null;
  const fxTag = rate ? (rate.source === "live" ? (ar ? "مباشر" : "live") : (ar ? "محفوظ" : "cached")) : (ar ? "تقديري" : "est");

  const auto = <span style={{ fontSize: 9.5, fontWeight: 800, letterSpacing: 1, color: "var(--link)", border: `1px solid ${CYAN}`, borderRadius: 20, padding: "1px 7px", marginLeft: 7 }}>{ar ? "تلقائي" : "AUTO"}</span>;
  const box = { background: "var(--chip)", borderRadius: 12, padding: "10px 12px" };
  const lbl = { fontSize: 10.5, color: "var(--mut)", fontWeight: 800, textTransform: "uppercase", letterSpacing: .4 };
  const val = { fontSize: 15, fontWeight: 800, color: "var(--ink)", marginTop: 2 };
  const mini = { background: "var(--chip)", borderRadius: 12, padding: "10px 8px", textAlign: "center", flex: 1 };
  const prayerRow = (k, name) => {
    const hot = np && np.key === k;
    return (
      <div key={k} style={{ display: "flex", justifyContent: "space-between", padding: "7px 8px", borderRadius: 8, background: hot ? "rgba(184,134,47,.10)" : "transparent", borderBottom: "1px solid var(--line)" }}>
        <span style={{ fontSize: 13, color: hot ? ORANGE : "var(--mut)", fontWeight: hot ? 800 : 400 }}>{name}{hot ? ` · ${ar ? "التالية" : "next"}` : ""}</span>
        <span style={{ fontSize: 13.5, fontWeight: 800, color: hot ? ORANGE : "var(--ink)" }}>{p[k]}</span>
      </div>
    );
  };

  return (
    <div style={{ marginTop: 8 }}>
      <Label>{ar ? "اليوم في الوجهة" : "Today at your destination"} {auto}</Label>

      {/* Unified TODAY strip — links live weather + next prayer (auto) with the next agenda item (admin-filled) */}
      <Card style={{ marginBottom: 12 }}>
        <div style={{ display: "flex", gap: 8 }}>
          <div style={mini}>
            <div style={{ fontSize: 22 }}>{wx.emoji}</div>
            <div style={{ fontSize: 15, fontWeight: 800, color: "var(--ink)" }}>{wx.now != null ? `${wx.now}°` : `${wx.hi}°`}</div>
            <div style={{ fontSize: 10, color: "var(--mut)", fontWeight: 700 }}>{wx.label}</div>
            <div style={{ fontSize: 8.5, color: wx.col, fontWeight: 800, letterSpacing: .5 }}>{wx.src}</div>
          </div>
          <div style={mini}>
            <div style={{ fontSize: 22 }}>🕌</div>
            <div style={{ fontSize: 15, fontWeight: 800, color: "var(--ink)" }}>{np ? np.time : "—"}</div>
            <div style={{ fontSize: 10, color: "var(--mut)", fontWeight: 700 }}>{np ? np.name : ""}</div>
            <div style={{ fontSize: 8.5, color: "var(--mut)", fontWeight: 800 }}>{ar ? "الصلاة التالية" : "NEXT PRAYER"}</div>
          </div>
          <div style={mini}>
            <div style={{ fontSize: 22 }}>📍</div>
            <div style={{ fontSize: 12.5, fontWeight: 800, color: "var(--ink)", lineHeight: 1.15, marginTop: 3 }}>{nextAct ? nextAct.title : (ar ? "لا أنشطة" : "No items")}</div>
            <div style={{ fontSize: 9.5, color: ORANGE, fontWeight: 800, marginTop: 2 }}>{nextAct ? fmtTime(nextAct.start) : ""}</div>
            <div style={{ fontSize: 8.5, color: "var(--mut)", fontWeight: 800 }}>{ar ? "التالي بالبرنامج" : "NEXT (AGENDA)"}</div>
          </div>
        </div>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginTop: 9 }}>
          <span style={{ fontSize: 10.5, color: "var(--mut)" }}>
            {live
              ? (live.cached
                  ? (ar ? "آخر طقس محفوظ" : "Last saved forecast") + (updated ? ` · ${updated.toLocaleString([], { month: "short", day: "numeric", hour: "2-digit", minute: "2-digit" })}` : "")
                  : (ar ? "طقس مباشر · يُحدّث يومياً" : "Live · updates daily") + (updated ? ` · ${updated.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" })}` : ""))
              : (ar ? "طقس تقديري (غير متصل) — يتحوّل لمباشر عند الاتصال" : "Typical (offline) — switches to live when online")}
          </span>
          <button onClick={refresh} disabled={loading} style={{ fontSize: 11, fontWeight: 800, color: "var(--link)", background: "transparent", border: "none", cursor: "pointer" }}>{loading ? "…" : (ar ? "تحديث" : "Refresh")}</button>
        </div>
      </Card>

      {/* Facts grid */}
      <Card style={{ marginBottom: 12 }}>
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8 }}>
          <div style={box}><div style={lbl}>{ar ? "التوقيت المحلي" : "Local time"}</div><div style={val}>{r.localTime}</div></div>
          <div style={box}><div style={lbl}>{ar ? "العملة" : "Currency"}</div><div style={val}>{r.currency.code} <span style={{ fontSize: 13 }}>{r.currency.symbol}</span></div>{fxFmt && <div style={{ fontSize: 10, color: "var(--mut)", fontWeight: 700, marginTop: 2 }}>1 USD ≈ {fxFmt} <span style={{ color: rate && rate.source === "live" ? GOOD : "var(--mut)" }}>· {fxTag}</span></div>}</div>
          <div style={box}><div style={lbl}>{ar ? "المطار" : "Airport"}</div><div style={val}>{r.airport.code} <span style={{ fontSize: 12, color: "var(--mut)", fontWeight: 700 }}>{r.airport.km}km · {r.airport.driveMin}min</span></div></div>
          <div style={box}><div style={lbl}>{ar ? "القبلة" : "Qibla"}</div><div style={val}>{r.qibla.deg}° <span style={{ fontSize: 12, color: "var(--mut)", fontWeight: 700 }}>{r.qibla.compass}</span></div></div>
        </div>
        {live && live.days && live.days.length > 1 && (
          <div style={{ display: "flex", gap: 6, marginTop: 10 }}>
            {live.days.map((d, i) => (
              <div key={i} style={{ flex: 1, textAlign: "center", background: "var(--chip)", borderRadius: 10, padding: "7px 4px" }}>
                <div style={{ fontSize: 10, color: "var(--mut)", fontWeight: 700 }}>{i === 0 ? (ar ? "اليوم" : "Today") : new Date(d.date).toLocaleDateString([], { weekday: "short" })}</div>
                <div style={{ fontSize: 17 }}>{d.emoji}</div>
                <div style={{ fontSize: 12, fontWeight: 800, color: "var(--ink)" }}>{d.highC}°<span style={{ color: "var(--mut)", fontWeight: 600 }}>/{d.lowC}°</span></div>
              </div>
            ))}
          </div>
        )}
      </Card>

      <MiniConverter defaultTo={r.currency.code} />

      {/* Full prayer schedule (today) */}
      <Card style={{ marginBottom: 12 }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 4 }}>
          <span style={{ fontSize: 13.5, fontWeight: 800, color: "var(--ink)" }}>🕌 {ar ? "أوقات الصلاة اليوم" : "Prayer times — today"}</span>
          <span style={{ fontSize: 12, color: "var(--mut)" }}>🧭 {r.qibla.deg}° {r.qibla.compass}</span>
        </div>
        {prayerRow("fajr", ar ? "الفجر" : "Fajr")}
        {prayerRow("sunrise", ar ? "الشروق" : "Sunrise")}
        {prayerRow("dhuhr", ar ? "الظهر" : "Dhuhr")}
        {prayerRow("asr", ar ? "العصر" : "Asr")}
        {prayerRow("maghrib", ar ? "المغرب" : "Maghrib")}
        {prayerRow("isha", ar ? "العشاء" : "Isha")}
        <div style={{ fontSize: 10.5, color: "var(--mut)", marginTop: 8 }}>
          {ar ? "تُحسب يومياً من إحداثيات الوجهة." : "Recomputed daily from the destination's coordinates."}
          {r.prayerMethod && <span> · {ar ? "طريقة الحساب: " : "Method: "}<b style={{ color: "var(--ink)" }}>{r.prayerMethod.name}</b></span>}
        </div>
      </Card>

      {r.emergency && (
        <a href={`tel:${r.emergency.all}`} style={{ textDecoration: "none", display: "flex", justifyContent: "space-between", alignItems: "center", background: "var(--card)", border: `1px solid ${BAD}`, borderRadius: "var(--r)", padding: "12px 14px", marginBottom: 4 }}>
          <span style={{ fontSize: 13.5, fontWeight: 700, color: "var(--ink)" }}>🚨 {ar ? "الطوارئ" : "Emergency"} ({r.country})</span>
          <span style={{ fontSize: 14, fontWeight: 800, color: BAD }}>{r.emergency.all} ↗</span>
        </a>
      )}
    </div>
  );
}

    { k: "organization", en: "Organization & logistics", ar: "التنظيم واللوجستيات" },

    <div className="rise">
      <div style={{ marginTop: 8 }}><Label>{t("yourFeedback")}</Label></div>
      <Card style={{ marginBottom: 12 }}>
        <div style={{ fontSize: 14, fontWeight: 800, color: "var(--ink)" }}>{ar ? "تقييم البرنامج" : "Rate the program"}</div>
        <div style={{ fontSize: 11.5, color: "var(--mut)", margin: "4px 0 12px", lineHeight: 1.45 }}>{ar ? "تقييمك سري ويُستخدم لتحسين البرامج العلمية فقط." : "Your responses are private and used only to improve the scientific program."}</div>
        {FB_DIMS.map(d => {
          const cur = scores[d.k];
          return (
            <div key={d.k} style={{ marginBottom: 11 }}>
              <div style={{ fontSize: 12.5, fontWeight: 700, color: "var(--ink)", marginBottom: 5 }}>{ar ? d.ar : d.en}</div>

              <div style={{ display: "flex", gap: 6 }}>
                {[1, 2, 3, 4, 5].map(v => { const on = cur >= v; return (
                  <button key={v} onClick={() => setDim(d.k, v)} aria-label={d.k + " " + v} style={{ flex: 1, padding: "9px 0", fontSize: 21, borderRadius: 12, border: `1.5px solid ${cur === v ? ORANGE : "var(--line)"}`, background: on ? "rgba(184,134,47,.12)" : "var(--chip)", color: on ? ORANGE : "var(--mut)" }}>★</button>

        <div style={{ fontSize: 11, color: "var(--mut)", margin: "4px 0 12px" }}>{t("npsScale")}</div>

          style={{ width: "100%", padding: 12, fontSize: 14, borderRadius: "var(--rs)", border: "1px solid var(--line)", resize: "vertical", outline: "none", fontFamily: "inherit", background: "var(--chip)", color: "var(--ink)" }} />
      </Card>
      <button onClick={submit} disabled={!scores.overall} style={{ width: "100%", padding: "15px 0", borderRadius: "var(--r)", border: "none", fontSize: 15, fontWeight: 800, color: "#fff", background: !scores.overall ? "var(--line)" : ORANGE }}>{t("sendFb")}</button>
      <div style={{ fontSize: 11, color: "var(--mut)", textAlign: "center", marginTop: 10 }}>{t("privateTeam")}</div>
    </div>
  );
}

  const items = [
    { id: "home", label: t("nav_home"), icon: "⌂" },
    { id: "agenda", label: t("nav_agenda"), icon: "🗓" },

  return (
    <nav style={{ position: "fixed", bottom: 0, left: "50%", transform: "translateX(-50%)", width: "100%", maxWidth: 480, background: "var(--card)", borderTop: "1px solid var(--line)", paddingBottom: "env(safe-area-inset-bottom)", zIndex: 30 }}>

        {items.map(it => {

}

/* =========================================================================
   ORGANIZER DASHBOARD (light, organizer-only)
   ========================================================================= */
const OC = { navy: "#1B2A4A", paper: "#F0F4F8", white: "#fff", ink: "#16203a", mut: "#6b7689", line: "#dde4ee", good: GOOD, bad: BAD, warn: WARN, orange: ORANGE };
function OCard({ children, style }) { return <div style={{ background: OC.white, borderRadius: 16, border: `1px solid ${OC.line}`, padding: 16, ...style }}>{children}</div>; }
function OStat({ label, value, tone }) {
  return <div style={{ background: OC.white, border: `1px solid ${OC.line}`, borderRadius: 16, padding: 14, textAlign: "center" }}>
    <div style={{ fontSize: 26, fontWeight: 800, color: tone || OC.navy }}>{value}</div>
    <div style={{ fontSize: 11, color: OC.mut, fontWeight: 800, textTransform: "uppercase", letterSpacing: .6, marginTop: 2 }}>{label}</div>
  </div>;
}
/* Admin "Setup" — the intelligent auto-fill: organizer types the city/event, the
   engine instantly fills currency, prayer, weather, airport, attractions, emergency. */
function AdminSetup({ ev }) {
  const DI = (typeof window !== "undefined") ? window.DestIntel : null;
  const [city, setCity] = useState(ev.city || "");
  const [eventName, setEventName] = useState(ev.title || "");
  const r = DI ? DI.resolve(city) : null;
  const ok = r && r.resolved;
  const np = ok && DI.nextPrayer ? DI.nextPrayer(r.prayer, new Date(), r.tz) : null;
  const Field = ({ label, value }) => (
    <div style={{ display: "flex", justifyContent: "space-between", gap: 10, padding: "8px 0", borderBottom: `1px solid ${OC.line}` }}>
      <span style={{ fontSize: 12, color: OC.mut }}>{label}</span>
      <span style={{ fontSize: 12.5, fontWeight: 700, color: OC.navy, textAlign: "right", maxWidth: "62%" }}>{value}</span>
    </div>
  );
  return (
    <div>
      <OCard style={{ marginBottom: 12, borderColor: "#C9A24A" }}>
        <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
          <span style={{ fontSize: 20 }}>🏢</span>
          <div style={{ flex: 1 }}>
            <div style={{ fontSize: 13.5, fontWeight: 800, color: OC.navy }}>{ev.customer || "Company"} — company account</div>
            <div style={{ fontSize: 11.5, color: OC.mut, marginTop: 2 }}>All this company's events run on one template & brand. Manage the company profile, staff, white-label logo, archive & period reports (PDF/CSV) in the <b>Organizer Console</b> (web).</div>
          </div>
        </div>
      </OCard>
      <div style={{ fontSize: 11, fontWeight: 800, letterSpacing: 1, textTransform: "uppercase", color: OC.navy, margin: "0 2px 8px" }}>You fill</div>
      <OCard style={{ marginBottom: 12 }}>
        <label style={{ fontSize: 11, fontWeight: 800, color: OC.mut, textTransform: "uppercase", letterSpacing: .5 }}>Destination city</label>
        <input value={city} onChange={e => setCity(e.target.value)} placeholder="e.g. Dubai, Riyadh, Istanbul…" style={{ width: "100%", padding: "11px 12px", fontSize: 15, borderRadius: 10, border: `1px solid ${OC.line}`, outline: "none", margin: "5px 0 12px" }} />
        <label style={{ fontSize: 11, fontWeight: 800, color: OC.mut, textTransform: "uppercase", letterSpacing: .5 }}>Event name</label>
        <input value={eventName} onChange={e => setEventName(e.target.value)} placeholder="Scientific program name" style={{ width: "100%", padding: "11px 12px", fontSize: 15, borderRadius: 10, border: `1px solid ${OC.line}`, outline: "none", marginTop: 5 }} />
        <div style={{ fontSize: 11, color: OC.mut, marginTop: 10 }}>You also fill: hotel, agenda, speakers, and import the guest list. Everything below is filled <b>automatically</b>.</div>
      </OCard>

      <div style={{ display: "flex", alignItems: "center", gap: 8, margin: "0 2px 8px" }}>
        <span style={{ fontSize: 11, fontWeight: 800, letterSpacing: 1, textTransform: "uppercase", color: "#0E9C8E" }}>⚡ System fills automatically</span>
      </div>
      {ok ? (
        <OCard>
          <Field label="Country" value={r.country} />
          <Field label="Currency" value={`${r.currency.name} (${r.currency.code} ${r.currency.symbol})`} />
          <Field label="Local time" value={r.localTime} />
          <Field label="Prayer method" value={r.prayerMethod ? r.prayerMethod.name : "—"} />
          <Field label="Next prayer" value={np ? `${np.name} · ${np.time}` : "—"} />
          <Field label="Typical weather" value={`${r.weather.typicalHighC}°C · ${r.weather.label}`} />
          <Field label="Airport" value={`${r.airport.name} (${r.airport.code}) · ${r.airport.km} km / ${r.airport.driveMin} min`} />
          <Field label="Qibla" value={`${r.qibla.deg}° ${r.qibla.compass}`} />
          <Field label="Emergency" value={r.emergency ? r.emergency.all : "—"} />
          <Field label="Notable mosque" value={r.mosque || "—"} />
          <div style={{ paddingTop: 10 }}>
            <div style={{ fontSize: 11, fontWeight: 800, color: OC.mut, textTransform: "uppercase", letterSpacing: .5, marginBottom: 6 }}>Places to visit</div>
            <div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>
              {(r.attractions || []).map((a, i) => <span key={i} style={{ fontSize: 11.5, fontWeight: 700, background: OC.paper, color: OC.navy, border: `1px solid ${OC.line}`, borderRadius: 16, padding: "5px 10px" }}>📍 {a}</span>)}
            </div>
          </div>
        </OCard>
      ) : (
        <OCard><div style={{ fontSize: 13, color: OC.mut }}>Type a known city to preview the auto-fill. Unknown cities still get prayer & qibla once coordinates are added.</div></OCard>
      )}
    </div>
  );
}

function AdminPanel({ ev, onClose }) {
  const [pin, setPin] = useState(""), [ok, setOk] = useState(false), [view, setView] = useState("live");
  const { ov, setOverride } = useOverrides(ev.id);
  const [activeId, setActiveId] = useState(ev.day.items.find(i => i.checkin)?.id);
  const [recordsByItem, setRecordsByItem] = useState({});
  const [feedback, setFeedback] = useState([]);
  const [loading, setLoading] = useState(false), [toast, setToast] = useState("");
  const checkinItems = useMemo(() => ev.day.items.filter(i => i.checkin), [ev]);

  const loadAll = useCallback(async () => {
    setLoading(true); const out = {};
    for (const it of checkinItems) { const raw = await store.get(NS(ev.id).attend(it.id), true); out[it.id] = raw ? JSON.parse(raw) : {}; }
    setRecordsByItem(out);
    const fbRaw = await store.get(NS(ev.id).feedback, true); setFeedback(fbRaw ? JSON.parse(fbRaw) : []); setLoading(false);
  }, [ev.id, checkinItems]);
  useEffect(() => { if (ok) loadAll(); }, [ok, loadAll]);
  useEffect(() => { if (!ok) return; const t = setInterval(loadAll, 6000); return () => clearInterval(t); }, [ok, loadAll]); // live auto-refresh
  const showToast = (m) => { setToast(m); setTimeout(() => setToast(""), 2000); };

  const nowTs = Date.now();
  const alerts = checkinItems.map(it => {
    const present = recordsByItem[it.id] || {}; const missing = ev.guests.filter(g => !present[g.n]);
    return { it, missing, state: activityState(it, nowTs) };
  }).filter(a => a.missing.length > 0 && (a.state === "closed" || a.state === "open"));

  const active = checkinItems.find(i => i.id === activeId) || checkinItems[0];
  const present = recordsByItem[active?.id] || {};
  const presentNames = Object.keys(present);
  const missed = ev.guests.filter(g => !present[g.n]);
  const total = ev.guests.length;

  // program dashboard metrics (auto-refreshing)
  const sumPresent = checkinItems.reduce((a, it) => a + Object.keys(recordsByItem[it.id] || {}).length, 0);
  const possible = checkinItems.length * total;
  const attendRate = possible ? Math.round((sumPresent / possible) * 100) : 0;
  const missedOpenClosed = checkinItems.reduce((a, it) => {
    const s = activityState(it, nowTs);
    if (s === "open" || s === "closed") { const pres = recordsByItem[it.id] || {}; a += ev.guests.filter(g => !pres[g.n]).length; }
    return a;
  }, 0);

  const nudge = (name) => `Dear ${name}, this is the ${ev.customer} team. We are gathering now for "${active?.title}" (${fmtTime(active?.start)}). Please join us and confirm your attendance in the event app. Thank you.`;
  const waLink = (p, t) => `https://wa.me/${p.replace(/[^0-9]/g, "")}?text=${encodeURIComponent(t)}`;
  const broadcast = () => `${ev.customer} · ${ev.city} — reminder\nActivity: ${active?.title} (${fmtTime(active?.start)})\nMissing ${missed.length}/${total}. Please join and confirm in the app.`;
  const fullReport = () => [`${ev.customer} · ${ev.city} — attendance status`, "", ...checkinItems.map(it => { const c = Object.keys(recordsByItem[it.id] || {}).length; return `${KIND[it.kind]?.icon || ""} ${it.title} (${fmtTime(it.start)}): ${c}/${total} present, ${total - c} missing`; })].join("\n");
  const copy = async (t) => { try { await navigator.clipboard.writeText(t); showToast("Copied"); } catch { showToast("Copy unavailable"); } };

  const npsVals = feedback.filter(x => x.nps != null).map(x => x.nps);
  const npsScore = npsVals.length ? Math.round(((npsVals.filter(n => n >= 9).length - npsVals.filter(n => n <= 6).length) / npsVals.length) * 100) : null;
  const avgStars = feedback.filter(x => x.rating).length ? (feedback.reduce((a, x) => a + (x.rating || 0), 0) / feedback.filter(x => x.rating).length).toFixed(1) : "—";

  return (
    <div style={{ position: "fixed", inset: 0, background: "rgba(10,16,30,.55)", display: "flex", alignItems: "flex-end", justifyContent: "center", zIndex: 60 }} onClick={onClose}>
      <div onClick={e => e.stopPropagation()} className="fade" style={{ background: OC.paper, width: "100%", maxWidth: 480, maxHeight: "94vh", overflowY: "auto", borderRadius: "20px 20px 0 0", padding: 18, color: OC.ink, fontFamily: "Arial,sans-serif" }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 14 }}>
          <div style={{ display: "flex", alignItems: "center", gap: 8 }}><VeridiqaMark size={18} color="#0EA5A0" /><strong style={{ color: OC.navy, fontSize: 16 }}>Organizer · {ev.city}</strong></div>
          <button onClick={onClose} aria-label="Close" style={{ background: "none", border: "none", fontSize: 24, color: OC.mut }}>×</button>
        </div>

        {!ok ? (
          <OCard>
            <div style={{ fontSize: 13, color: OC.mut, marginBottom: 10 }}>Enter organizer PIN.</div>
            <input value={pin} onChange={e => setPin(e.target.value)} type="password" inputMode="numeric" placeholder="PIN"
              style={{ width: "100%", padding: "13px 14px", fontSize: 16, borderRadius: 12, border: `1px solid ${OC.line}`, outline: "none", marginBottom: 10 }} />
            <button onClick={() => setOk(pin === ADMIN_PIN)} style={{ width: "100%", padding: "13px 0", borderRadius: 12, border: "none", background: OC.navy, color: "#fff", fontWeight: 800, fontSize: 15 }}>Unlock</button>
            {pin && pin !== ADMIN_PIN && <div style={{ color: OC.bad, fontSize: 12, marginTop: 8 }}>Incorrect PIN.</div>}
          </OCard>
        ) : (
          <>
            <div style={{ display: "flex", gap: 6, background: OC.white, border: `1px solid ${OC.line}`, borderRadius: 12, padding: 4, marginBottom: 14 }}>
              {[["live", "Live"], ["setup", "Setup"], ["alerts", `Alerts${alerts.length ? " · " + alerts.length : ""}`], ["feedback", "Feedback"]].map(([k, lbl]) => (
                <button key={k} onClick={() => setView(k)} style={{ flex: 1, border: "none", borderRadius: 9, padding: "9px 0", fontSize: 12.5, fontWeight: 800, background: view === k ? OC.navy : "transparent", color: view === k ? "#fff" : (k === "alerts" && alerts.length ? OC.bad : OC.mut) }}>{lbl}</button>
              ))}
            </div>

            {view === "setup" && <AdminSetup ev={ev} />}

            {view === "live" && (<>
              {/* live program dashboard */}
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr 1fr", gap: 8, marginBottom: 12 }}>
                <OStat label="Invited" value={total} tone={OC.navy} />
                <OStat label="Check-ins" value={sumPresent} tone={OC.good} />
                <OStat label="Attend" value={attendRate + "%"} tone={OC.orange} />
                <OStat label="Missed" value={missedOpenClosed} tone={missedOpenClosed ? OC.bad : OC.good} />
              </div>
              <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", margin: "0 2px 8px" }}>
                <span style={{ fontSize: 11, fontWeight: 800, letterSpacing: 1, textTransform: "uppercase", color: OC.navy }}>By activity</span>
                <span style={{ fontSize: 10.5, color: OC.mut }}>● live · auto-refresh</span>
              </div>
              {checkinItems.map(it => {
                const pres = recordsByItem[it.id] || {}; const c = Object.keys(pres).length; const miss = total - c;
                const s = activityState(it, nowTs); const pct = total ? Math.round((c / total) * 100) : 0;
                return (
                  <button key={"dash-" + it.id} onClick={() => setActiveId(it.id)} style={{ display: "block", width: "100%", textAlign: "left", background: OC.white, border: `1px solid ${it.id === active?.id ? OC.orange : OC.line}`, borderRadius: 12, padding: "10px 12px", marginBottom: 8 }}>
                    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 7 }}>
                      <span style={{ fontSize: 13, fontWeight: 800, color: OC.navy }}>{KIND[it.kind]?.icon} {it.title}</span>
                      <span style={{ fontSize: 11.5, fontWeight: 800, color: miss ? OC.bad : OC.good }}>{c}/{total}{miss ? ` · ${miss} missed` : " · full"}</span>
                    </div>
                    <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                      <div style={{ flex: 1, height: 7, background: OC.paper, borderRadius: 6, overflow: "hidden" }}>
                        <div style={{ width: pct + "%", height: "100%", background: s === "closed" && miss ? OC.bad : OC.orange }} />
                      </div>
                      <span style={{ fontSize: 10, fontWeight: 800, textTransform: "uppercase", color: s === "open" ? OC.orange : s === "closed" ? OC.mut : OC.mut }}>{s}</span>
                    </div>
                  </button>
                );
              })}
              <div style={{ height: 6 }} />
              <div style={{ fontSize: 11, fontWeight: 800, letterSpacing: 1, textTransform: "uppercase", color: OC.navy, margin: "6px 2px 8px" }}>Drill-down & nudge</div>
              <div style={{ display: "flex", gap: 8, overflowX: "auto", marginBottom: 14, paddingBottom: 2 }}>
                {checkinItems.map(it => {
                  const on = it.id === active?.id; const c = Object.keys(recordsByItem[it.id] || {}).length;
                  return (
                    <button key={it.id} onClick={() => setActiveId(it.id)} style={{ flex: "0 0 auto", border: on ? `1px solid ${OC.orange}` : `1px solid ${OC.line}`, background: on ? OC.orange : OC.white, color: on ? "#fff" : OC.ink, borderRadius: 11, padding: "8px 12px", minWidth: 124, textAlign: "left" }}>
                      <div style={{ fontSize: 12, fontWeight: 800 }}>{KIND[it.kind]?.icon} {it.title.length > 16 ? it.title.slice(0, 15) + "…" : it.title}</div>
                      <div style={{ fontSize: 11, opacity: .85 }}>{fmtTime(it.start)} · {c}/{total}</div>
                    </button>
                  );
                })}
              </div>
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 10, marginBottom: 12 }}>
                <OStat label="Present" value={presentNames.length} tone={OC.good} />
                <OStat label="Missed" value={missed.length} tone={missed.length ? OC.bad : OC.good} />
                <OStat label="Invited" value={total} tone={OC.navy} />
              </div>
              <div style={{ display: "flex", gap: 8, marginBottom: 12 }}>
                <button onClick={loadAll} style={{ flex: 1, background: OC.white, border: `1px solid ${OC.line}`, borderRadius: 11, padding: "11px 0", fontSize: 13, fontWeight: 800, color: OC.navy }}>{loading ? "…" : "↻ Refresh"}</button>
                <button onClick={() => copy(broadcast())} style={{ flex: 2, background: OC.navy, border: "none", borderRadius: 11, padding: "11px 0", fontSize: 13, fontWeight: 800, color: "#fff" }}>Copy broadcast reminder</button>
              </div>
              {active && (() => {
                const cur = ov[active.id], effSt = activityState(active, Date.now(), cur), autoSt = activityState(active, Date.now(), undefined);
                const Btn = ({ val, label, bg }) => <button onClick={() => setOverride(active.id, cur === val ? null : val)} style={{ flex: 1, border: "none", borderRadius: 10, padding: "9px 0", fontSize: 12.5, fontWeight: 800, background: cur === val ? bg : OC.white, color: cur === val ? "#fff" : OC.ink, boxShadow: `inset 0 0 0 1px ${OC.line}` }}>{label}</button>;
                return (
                  <div style={{ background: OC.white, border: `1px solid ${OC.line}`, borderRadius: 12, padding: 12, marginBottom: 16 }}>
                    <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 8 }}>
                      <span style={{ fontSize: 12, fontWeight: 800, color: OC.navy }}>Check-in window</span>
                      <span style={{ fontSize: 11, color: OC.mut }}>now: <b style={{ color: effSt === "open" ? OC.orange : effSt === "closed" ? OC.bad : OC.mut }}>{effSt}</b>{cur ? " · override" : ` · auto (${autoSt})`}</span>
                    </div>
                    <div style={{ display: "flex", gap: 8 }}>
                      <Btn val="open" label="Force open" bg={OC.orange} /><Btn val="closed" label="Force close" bg={OC.bad} />
                      <button onClick={() => setOverride(active.id, null)} style={{ flex: 1, border: "none", borderRadius: 10, padding: "9px 0", fontSize: 12.5, fontWeight: 800, background: cur ? OC.white : OC.navy, color: cur ? OC.ink : "#fff", boxShadow: `inset 0 0 0 1px ${OC.line}` }}>Auto</button>
                    </div>
                  </div>
                );
              })()}
              <div style={{ fontSize: 11, fontWeight: 800, letterSpacing: 1, textTransform: "uppercase", color: OC.navy, margin: "2px 2px 10px" }}>Missed — {active?.title}</div>
              {missed.length === 0 && <OCard><div style={{ color: OC.good, fontSize: 13, fontWeight: 700 }}>Everyone is checked in. ✓</div></OCard>}
              {missed.map(g => (
                <div key={g.n} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", background: OC.white, border: `1px solid ${OC.line}`, borderRadius: 12, padding: "11px 13px", marginBottom: 8 }}>
                  <div><div style={{ fontSize: 13.5, fontWeight: 700 }}>{g.n}</div><div style={{ fontSize: 11.5, color: OC.mut }}>{g.p}</div></div>
                  <a href={waLink(g.p, nudge(g.n))} target="_blank" rel="noreferrer" style={{ background: "#25D366", color: "#fff", textDecoration: "none", fontSize: 12.5, fontWeight: 800, borderRadius: 9, padding: "8px 13px" }}>WhatsApp</a>
                </div>
              ))}
            </>)}

            {view === "alerts" && (<>
              <div style={{ display: "flex", gap: 8, marginBottom: 14 }}>
                <button onClick={loadAll} style={{ flex: 1, background: OC.white, border: `1px solid ${OC.line}`, borderRadius: 11, padding: "11px 0", fontSize: 13, fontWeight: 800, color: OC.navy }}>{loading ? "…" : "↻ Refresh"}</button>
                <button onClick={() => copy(fullReport())} style={{ flex: 2, background: OC.navy, border: "none", borderRadius: 11, padding: "11px 0", fontSize: 13, fontWeight: 800, color: "#fff" }}>Copy full status report</button>
              </div>
              {alerts.length === 0 && <OCard><div style={{ color: OC.good, fontSize: 13, fontWeight: 700 }}>No open gaps. Everyone accounted for. ✓</div></OCard>}
              {alerts.map(a => (
                <OCard key={a.it.id} style={{ marginBottom: 10, borderColor: a.state === "closed" ? OC.bad : OC.line }}>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8 }}>
                    <div style={{ fontWeight: 800, fontSize: 14, color: OC.navy }}>{KIND[a.it.kind]?.icon} {a.it.title}</div>
                    {a.state === "closed" ? <Pill bg={OC.bad}>Window closed</Pill> : <Pill bg={OC.warn}>Open</Pill>}
                  </div>
                  <div style={{ fontSize: 12.5, color: OC.mut, marginBottom: 10 }}>{a.missing.length} of {total} still missing{a.state === "closed" ? " after window closed" : ""}.</div>
                  <button onClick={() => { setActiveId(a.it.id); setView("live"); }} style={{ background: OC.orange, border: "none", color: "#fff", borderRadius: 9, padding: "8px 14px", fontSize: 12.5, fontWeight: 800 }}>Open missed list & nudge →</button>
                </OCard>
              ))}
            </>)}

            {view === "feedback" && (<>
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 10, marginBottom: 14 }}>
                <OStat label="Responses" value={feedback.length} tone={OC.navy} />
                <OStat label="NPS" value={npsScore === null ? "—" : npsScore} tone={OC.orange} />
                <OStat label="Avg ★" value={avgStars} tone={OC.warn} />
              </div>
              {feedback.length === 0 && <OCard><div style={{ color: OC.mut, fontSize: 13 }}>No feedback yet.</div></OCard>}
              {feedback.slice().reverse().map((x, i) => (
                <OCard key={i} style={{ marginBottom: 8, padding: 13 }}>
                  <div style={{ display: "flex", gap: 10, marginBottom: x.note ? 6 : 0 }}>
                    {x.nps != null && <Pill bg={x.nps >= 9 ? OC.good : x.nps <= 6 ? OC.bad : OC.navy}>NPS {x.nps}</Pill>}
                    {x.rating ? <span style={{ color: OC.orange, fontSize: 13 }}>{"★".repeat(x.rating)}<span style={{ color: OC.line }}>{"★".repeat(5 - x.rating)}</span></span> : null}
                  </div>
                  {x.note && <div style={{ fontSize: 13, color: OC.ink }}>{x.note}</div>}
                </OCard>
              ))}
            </>)}
            <div style={{ fontSize: 11, color: OC.mut, textAlign: "center", marginTop: 12 }}>Private to organizers · Powered by Veridiqa · Nexus</div>
          </>
        )}
        {toast && <div style={{ position: "fixed", left: "50%", bottom: 26, transform: "translateX(-50%)", background: OC.navy, color: "#fff", padding: "10px 18px", borderRadius: 24, fontSize: 13, fontWeight: 700, zIndex: 70 }}>{toast}</div>}
      </div>
    </div>
  );
}

/* =========================================================================
   THE CHAT — guided event assistant (free, zero-cost, AI-style).
   Answers from the event data via intent matching. Upgrade path: when a
   backend + API key exist, route questions to POST /api/assistant (LLM).
   ========================================================================= */
const CHIPS = {
  agenda: { en: "Agenda", ar: "الأجندة", q: "agenda" },
  hotel: { en: "Hotel & map", ar: "الفندق والموقع", q: "hotel" },
  checkin: { en: "Check-in", ar: "الحضور", q: "check-in" },
  weather: { en: "Weather", ar: "الطقس", q: "weather" },
  prayer: { en: "Prayer times", ar: "مواقيت الصلاة", q: "prayer" },
  transport: { en: "Transport", ar: "النقل", q: "transport" },
  contacts: { en: "Contacts", ar: "جهات الاتصال", q: "contacts" },
  feedback: { en: "Feedback", ar: "التقييم", q: "feedback" },
  currency: { en: "Currency", ar: "العملة", q: "currency" },
  time: { en: "Local time", ar: "التوقيت", q: "time" },
  airport: { en: "Airport", ar: "المطار", q: "airport" },
  places: { en: "Places to visit", ar: "أماكن للزيارة", q: "places to visit" },
};
function nexusAnswer(q, ev, lang) {
  const s = (q || "").toLowerCase(); const ar = lang === "ar"; const has = (...w) => w.some(x => s.includes(x)); const P = (en, a) => (ar ? a : en);
  // Destination intelligence — auto-linked to THIS event's city, no setup needed.
  const DI = (typeof window !== "undefined") ? window.DestIntel : null;
  const LS = (typeof window !== "undefined") ? window.localStorage : null;
  const R = DI ? DI.resolve(ev.id || ev.city) : null;
  const smart = R && R.resolved ? R : null;
  const wxCache = () => { try { const c = JSON.parse(LS.getItem("vq:wx:" + (ev.id || ev.city)) || "null"); return c && c.data ? c.data : null; } catch (e) { return null; } };
  const fxCache = () => { try { const c = JSON.parse(LS.getItem("vq:rates") || "null"); return c && c.rates ? c.rates : null; } catch (e) { return null; } };
  const fmtN = (n) => n == null ? "—" : (n >= 20 ? Math.round(n) : Number(n).toFixed(2));

  if (has("agenda", "program", "schedule", "session", "أجندة", "برنامج", "جلسة", "موعد"))
    return { text: `${ev.agenda.venue}\n${ev.agenda.date} · ${ev.agenda.timeRange}` + (ev.agenda.rows && ev.agenda.rows.length ? "\n\n" + ev.agenda.rows.map(r => `• ${r.t} — ${r.topic}${r.who ? ` (${r.who})` : ""}`).join("\n") : (ev.agenda.note ? `\n\n${ev.agenda.note}` : "")), chips: ["hotel", "checkin"] };
  if (has("hotel", "venue", "where", "location", "stay", "فندق", "مكان", "أين", "موقع"))
    return { text: P(`You're staying at ${ev.hotel.name}, ${ev.hotel.addr}.`, `إقامتك في ${ev.hotel.name}، ${ev.hotel.addr}.`), link: { label: P("Open hotel map", "افتح موقع الفندق"), href: ev.hotel.map }, chips: ["weather", "agenda"] };
  if (has("check", "attend", "حضور", "تسجيل"))
    return { text: P("Confirm your attendance at each activity in the Check-in tab — one tap per activity (transport, session, return, dinner).", "أكّد حضورك لكل نشاط من تبويب الحضور — ضغطة واحدة لكل نشاط (النقل، الجلسة، العودة، العشاء)."), action: { label: P("Open Check-in", "فتح الحضور"), go: "checkin" }, chips: ["agenda", "feedback"] };
  if (has("weather", "temperature", "pack", "wear", "طقس", "حرارة", "ملابس", "حقيبة")) {
    if (smart) {
      const lw = wxCache();
      const head = (lw && lw.today)
        ? `${lw.emoji} ${P("Today in", "اليوم في")} ${smart.city}: ${lw.today.highC}°/${lw.today.lowC}° ${lw.label}` + (lw.source === "live" ? P(" (live)", " (مباشر)") : P(" (saved)", " (محفوظ)"))
        : `🌡️ ${P("Typical in", "عادةً في")} ${smart.city}: ~${smart.weather.typicalHighC}°C ${smart.weather.label}`;
      const pack = (ev.weather && ev.weather.packing) ? "\n\n" + ev.weather.packing.map(p => `• ${p}`).join("\n") : "";
      return { text: head + pack, chips: ["prayer", "currency"] };
    }
    return { text: `${ev.weather.summary}\n\n` + ev.weather.packing.map(p => `• ${p}`).join("\n"), link: { label: P("Live forecast", "الطقس مباشر"), href: ev.weather.link }, chips: ["hotel", "prayer"] };
  }
  if (has("prayer", "salah", "صلاة", "الصلاة", "قبلة", "qibla")) {
    if (smart && smart.prayer) {
      const p = DI.prayerStrings(smart.prayer); const np = DI.nextPrayer(smart.prayer, new Date(), smart.tz);
      return { text: P(`Prayer times — ${smart.city} (today):`, `مواقيت الصلاة — ${smart.city} (اليوم):`) +

}

function Assistant({ ev, api, slug, lang, go }) {
  const [open, setOpen] = useState(false);
  const [input, setInput] = useState("");
  const [msgs, setMsgs] = useState([]);
  const ar = lang === "ar";
  const greet = () => api
    ? { from: "bot", text: ar ? "مرحباً! اسألني عن البرنامج أو الفندق أو الحضور أو جهات الاتصال." : "Hi! Ask me about the program, hotel, check-in or contacts.", chips: ["agenda", "hotel", "checkin", "contacts"] }
    : { from: "bot", ...nexusAnswer("hi", ev, lang) };
  useEffect(() => { if (open && msgs.length === 0) setMsgs([greet()]); }, [open]); // eslint-disable-line
  const ask = async (q) => {
    if (!q.trim()) return;
    setMsgs(m => [...m, { from: "user", text: q }]); setInput("");
    if (api) {
      try { const r = await fetch(`${api}/api/e/${slug}/assistant`, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ q }) }); const d = await r.json(); setMsgs(m => [...m, { from: "bot", text: d.answer, chips: d.chips }]); }
      catch { setMsgs(m => [...m, { from: "bot", text: ar ? "تعذّر الاتصال بالمساعد." : "Couldn't reach the assistant." }]); }
    } else setMsgs(m => [...m, { from: "bot", ...nexusAnswer(q, ev, lang) }]);
  };
  return (
    <>
      <button onClick={() => setOpen(o => !o)} aria-label="assistant" style={{ position: "fixed", bottom: 78, [ar ? "left" : "right"]: 16, zIndex: 45, width: 54, height: 54, borderRadius: 27, border: "none", background: "linear-gradient(135deg,#14B8A6,#0EA5A0)", color: "#fff", fontSize: 24, boxShadow: "0 10px 26px rgba(20,184,166,.45)" }}>{open ? "×" : "💬"}</button>
      {open && (
        <div style={{ position: "fixed", bottom: 142, [ar ? "left" : "right"]: 14, width: "calc(100% - 28px)", maxWidth: 360, maxHeight: "62vh", display: "flex", flexDirection: "column", background: "var(--card)", border: "1px solid var(--line)", borderRadius: 18, boxShadow: "var(--shHi)", overflow: "hidden", zIndex: 45 }}>
          <div style={{ background: "var(--ink)", color: "#fff", padding: "12px 14px", display: "flex", alignItems: "center", gap: 8 }}>
            <VeridiqaMark size={18} color={CYAN} />
            <div><div style={{ fontWeight: 800, fontSize: 14 }}>{ar ? "مساعد الفعالية" : "Event Assistant"}</div><div style={{ fontSize: 10.5, opacity: .65 }}>{ev ? `${ev.customer} · ${ev.city}` : (slug || "")}</div></div>
          </div>
          <div style={{ flex: 1, overflowY: "auto", padding: 12, display: "flex", flexDirection: "column", gap: 8 }}>
            {msgs.map((m, i) => m.from === "user" ? (
              <div key={i} style={{ alignSelf: ar ? "flex-start" : "flex-end", background: ORANGE, color: "var(--onAccent)", padding: "8px 12px", borderRadius: 14, fontSize: 13.5, maxWidth: "85%" }}>{m.text}</div>
            ) : (
              <div key={i} style={{ alignSelf: ar ? "flex-end" : "flex-start", maxWidth: "90%" }}>
                <div style={{ background: "var(--chip)", color: "var(--ink)", padding: "10px 12px", borderRadius: 14, fontSize: 13.5, whiteSpace: "pre-wrap", lineHeight: 1.5 }}>{m.text}</div>
                {m.link && <a href={m.link.href} target="_blank" rel="noreferrer" style={{ display: "inline-block", marginTop: 6, color: "var(--link)", fontWeight: 800, fontSize: 12.5, textDecoration: "none" }}>{m.link.label} ↗</a>}
                {m.action && <button onClick={() => { go && go(m.action.go); setOpen(false); }} style={{ display: "block", marginTop: 6, background: ORANGE, color: "var(--onAccent)", border: "none", borderRadius: 10, padding: "8px 12px", fontSize: 12.5, fontWeight: 800 }}>{m.action.label} →</button>}
                {m.chips && <div style={{ display: "flex", flexWrap: "wrap", gap: 6, marginTop: 8 }}>{m.chips.map(c => <button key={c} onClick={() => ask(CHIPS[c].q)} style={{ background: "var(--card)", border: "1px solid var(--line)", color: "var(--ink)", borderRadius: 16, padding: "5px 11px", fontSize: 12, fontWeight: 700 }}>{CHIPS[c][ar ? "ar" : "en"]}</button>)}</div>}
              </div>
            ))}
          </div>
          <div style={{ display: "flex", gap: 8, padding: 10, borderTop: "1px solid var(--line)" }}>
            <input value={input} onChange={e => setInput(e.target.value)} onKeyDown={e => { if (e.key === "Enter") ask(input); }} placeholder={ar ? "اسأل عن الفعالية…" : "Ask about the event…"} style={{ flex: 1, padding: "10px 12px", border: "1px solid var(--line)", borderRadius: 12, background: "var(--chip)", color: "var(--ink)", fontSize: 14, outline: "none" }} />
            <button onClick={() => ask(input)} style={{ background: ORANGE, color: "var(--onAccent)", border: "none", borderRadius: 12, padding: "0 16px", fontWeight: 800 }}>➤</button>
          </div>
        </div>
      )}
    </>
  );
}
